<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zork I: The Great Underground Empire</title>
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <script type="module" crossorigin src="/zork-pwa/assets/index-CalZ0YmU.js"></script>
  <link rel="stylesheet" crossorigin href="/zork-pwa/assets/index-DH3q0CNV.css">
</head>
<body>
  <div class="crt">
    <div class="scanlines"></div>
    <button id="about-btn" class="about-btn" title="About">?</button>
    <div class="terminal">
      <div id="output" class="output"></div>
      <div class="input-line">
        <span class="prompt">&gt;</span>
        <input
          type="text"
          id="input"
          class="input"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          autofocus
        >
      </div>
    </div>
  </div>
  <!-- About Modal -->
  <div id="about-modal" class="modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2>About this web</h2>
      <div class="modal-body">
        <p>This web version of Zork I includes files from the <a href="https://github.com/historicalsource/zork1" target="_blank" rel="noopener">historicalsource/zork1</a> repository, distributed under the MIT License.</p>
        <p class="authors">Original authors: Infocom, Inc.</p>
        <hr class="modal-divider">
        <p class="powered-by">Powered by <a href="https://betazeta.tech" target="_blank" rel="noopener">bzd</a></p>
      </div>
    </div>
  </div>

  <!-- Install PWA button -->
  <button id="installBtn" class="install-btn">Install App</button>

  <script>
    // PWA install logic
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
      installBtn.style.display = 'none';
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((result) => {
          if (result.outcome === 'accepted') installBtn.style.display = 'none';
          deferredPrompt = null;
        });
      } else {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (isIOS) {
          alert('Tap the Share button, then "Add to Home Screen"');
        } else {
          alert('Use your browser menu to install this app');
        }
      }
    });

    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
